<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>Reel — Minimal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root { --dark-blue:#08316F; --sky-blue:#00B6FF; }

html, body {
  width:1080px; height:1920px; overflow:hidden;
  font-family:'Inter', sans-serif;
  background:var(--brand-bg, #F7F6F2); color:#111;
}
#scene-container { width:1080px; height:1920px; position:relative; }

/* ── SCENE BASE — always light ── */
.scene {
  width:1080px; height:1920px; position:absolute; inset:0;
  display:flex; flex-direction:column; overflow:hidden;
  background:var(--brand-bg, #F7F6F2);
}

/* ── BRAND CHROME ── */
.brand-strip {
  position:absolute; top:0; left:0; right:0; height:4px;
  background: var(--dark-blue);
  z-index:10;
}
.brand-bar {
  position:absolute; top:4px; left:0; right:0; height:76px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 72px; z-index:10; background:#F7F6F2;
  border-bottom:1px solid rgba(0,0,0,0.1);
}
.brand-name {
  font-size:14px; font-weight:700; letter-spacing:0.22em;
  text-transform:uppercase; color:var(--dark-blue);
}
.brand-badge {
  font-size:10px; font-weight:600; letter-spacing:0.3em;
  text-transform:uppercase; color:rgba(0,0,0,0.3);
}
.scene-footer {
  position:absolute; bottom:0; left:0; right:0; height:64px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 72px; z-index:10; background:#F7F6F2;
  border-top:1px solid rgba(0,0,0,0.1);
}
.ftr-l {
  font-size:13px; font-weight:600; letter-spacing:0.18em;
  text-transform:uppercase; color:rgba(0,0,0,0.3);
}
.ftr-r { font-size:12px; color:rgba(0,0,0,0.2); }

/* ── INNER CONTENT AREA ── */
.scn-inner {
  position:absolute; top:80px; bottom:64px; left:0; right:0;
  display:flex; flex-direction:column;
  padding:72px 72px 48px;
  z-index:1;
}
.scn-inner.center { justify-content:center; }

/* ── TITLE CARD — left-aligned editorial ── */
.tc-num {
  font-size:13px; font-weight:600; letter-spacing:0.32em;
  text-transform:uppercase; color:var(--sky-blue); margin-bottom:48px;
}
.tc-rule-h { width:48px; height:2px; background:var(--dark-blue); margin-bottom:56px; }
.tc-headline {
  font-size:108px; font-weight:800; line-height:0.92;
  color:var(--dark-blue); letter-spacing:-0.03em; margin-bottom:64px;
}
.tc-divider {
  display:flex; align-items:center; gap:24px; margin-bottom:56px;
}
.tc-divider-line { flex:1; height:1px; background:rgba(0,0,0,0.15); }
.tc-divider-dot { width:6px; height:6px; border-radius:50%; background:var(--sky-blue); flex-shrink:0; }
.tc-sub {
  font-size:28px; font-weight:300; line-height:1.6;
  color:rgba(0,0,0,0.52); max-width:760px;
}

/* ── BIG NUMBER — left-bordered block ── */
.bn-label {
  font-size:13px; font-weight:600; letter-spacing:0.32em;
  text-transform:uppercase; color:rgba(0,0,0,0.4); margin-bottom:64px;
}
.bn-block {
  border-left:5px solid var(--dark-blue);
  padding:48px 56px; margin-bottom:64px;
  background:rgba(0,0,0,0.03);
  display:flex; align-items:baseline; gap:16px;
}
.bn-value {
  font-size:220px; font-weight:900; line-height:0.85;
  color:var(--dark-blue); letter-spacing:-0.05em;
}
.bn-unit {
  font-size:72px; font-weight:300; color:var(--sky-blue);
  letter-spacing:0.02em;
}
.bn-context {
  font-size:26px; font-weight:400; color:rgba(0,0,0,0.55);
  line-height:1.6; max-width:700px; padding-left:61px;
}

/* ── TEXT BULLETS — numbered grid list ── */
.tb-header { margin-bottom:56px; }
.tb-label {
  font-size:13px; font-weight:600; letter-spacing:0.32em;
  text-transform:uppercase; color:var(--sky-blue); margin-bottom:16px;
}
.tb-title {
  font-size:64px; font-weight:800; line-height:0.95;
  color:var(--dark-blue); letter-spacing:-0.02em;
}
.tb-rule { width:100%; height:1px; background:rgba(0,0,0,0.12); margin-bottom:0; }
.tb-item {
  display:grid; grid-template-columns:56px 1fr;
  align-items:baseline; gap:0;
  padding:28px 0;
  border-bottom:1px solid rgba(0,0,0,0.08);
  opacity:0; transform:translateY(8px);
  transition:opacity 0.5s, transform 0.5s;
}
.tb-item.visible { opacity:1; transform:none; }
.tb-num {
  font-size:14px; font-weight:700; color:var(--sky-blue);
  letter-spacing:0.08em; padding-top:6px;
}
.tb-text {
  font-size:28px; font-weight:500; color:rgba(0,0,0,0.82);
  line-height:1.5;
}

/* ── BAR CHART — ultra-thin, labels above ── */
.bc-label-tag {
  font-size:13px; font-weight:600; letter-spacing:0.32em;
  text-transform:uppercase; color:var(--sky-blue); margin-bottom:16px;
}
.bc-title {
  font-size:60px; font-weight:800; line-height:0.95;
  color:var(--dark-blue); letter-spacing:-0.02em; margin-bottom:56px;
}
.bc-rule { width:100%; height:1px; background:rgba(0,0,0,0.12); margin-bottom:52px; }
.bc-bars { flex:1; display:flex; flex-direction:column; justify-content:space-evenly; gap:20px; }
.bc-row { display:flex; flex-direction:column; gap:10px; }
.bc-meta { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
.bc-lbl {
  font-size:20px; font-weight:500; color:rgba(0,0,0,0.65);
}
.bc-vl {
  font-size:24px; font-weight:800; color:var(--dark-blue);
  letter-spacing:-0.01em;
}
.bc-track { height:3px; background:rgba(0,0,0,0.1); }
.bc-fill {
  height:100%; background:var(--dark-blue);
  width:0%; transition:width 1.2s cubic-bezier(0.4,0,0.2,1);
}
.bc-fill.anim { width:var(--w); }
.bc-source {
  font-size:14px; color:rgba(0,0,0,0.28); margin-top:24px; text-align:right;
}

/* ── CTA — typography only ── */
.scene.scene-cta { background:#F7F6F2 !important; }
.cta-wrap {
  display:flex; flex-direction:column; height:100%;
  padding:80px 72px;
}
.cta-top-rule { width:100%; height:1px; background:rgba(0,0,0,0.12); margin-bottom:72px; }
.cta-label {
  font-size:13px; font-weight:600; letter-spacing:0.32em;
  text-transform:uppercase; color:var(--sky-blue); margin-bottom:40px;
}
.cta-headline {
  font-size:96px; font-weight:900; line-height:0.9;
  color:var(--dark-blue); letter-spacing:-0.03em; margin-bottom:60px;
}
.cta-rule { width:48px; height:2px; background:var(--dark-blue); margin-bottom:48px; }
.cta-sub {
  font-size:26px; font-weight:300; color:rgba(0,0,0,0.52);
  line-height:1.65; flex:1; max-width:760px;
}
.cta-btn-wrap { margin-top:auto; }
.cta-btn {
  display:inline-flex; align-items:center; gap:16px;
  border-bottom:2px solid var(--dark-blue); padding-bottom:8px;
  font-size:16px; font-weight:700; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--dark-blue);
}
.cta-btn::after {
  content:'→'; font-size:20px; font-weight:400;
}
</style>
</head>
<body>
<div id="scene-container"></div>
<script>
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(s){ return esc(s).replace(/\*([^*]+)\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'); }
function fitText(el, minPx){
  if(!el||!el.parentElement) return;
  let sz=parseFloat(getComputedStyle(el).fontSize), i=0;
  while(i++<80 && el.scrollHeight>el.parentElement.clientHeight+8 && sz>minPx){ sz-=2; el.style.fontSize=sz+'px'; }
}

function _B(){ return (window.__brand&&window.__brand.name)||''; }
function _U(){ return ''; }
function chrome(){
  return `<div class="brand-strip"></div>
<div class="brand-bar"><span class="brand-name">${_B()}</span><span class="brand-badge">REEL</span></div>
<div class="scene-footer"><span class="ftr-l">${_B()}</span><span class="ftr-r">${_U()}</span></div>`;
}

window.loadScene = function(data){
  const c = document.getElementById('scene-container');
  const v = data.visuel || {};
  const tv = data.type_visuel || 'title_card';
  let html = '';

  if(tv === 'title_card'){
    html = `<div class="scene">
      ${chrome()}
      <div class="scn-inner">
        ${v.eyebrow ? `<div class="tc-num">${esc(v.eyebrow)}</div>` : '<div class="tc-rule-h"></div>'}
        <div class="tc-headline" id="_hl">${fmt(v.titre_principal||v.titre||'')}</div>
        <div class="tc-divider"><div class="tc-divider-line"></div><div class="tc-divider-dot"></div><div class="tc-divider-line"></div></div>
        <div class="tc-sub" id="_sub">${fmt(v.sous_titre||v.subtitle||'')}</div>
      </div>
    </div>`;

  } else if(tv === 'big_number'){
    html = `<div class="scene">
      ${chrome()}
      <div class="scn-inner center">
        <div class="bn-label" id="_ey">${esc(v.eyebrow||v.label||v.titre||'').toUpperCase()}</div>
        <div class="bn-block">
          <div class="bn-value">${esc(v.valeur||'0')}</div>
          <div class="bn-unit">${esc(v.unite||'')}</div>
        </div>
        <div class="bn-context" id="_ctx">${fmt(v.contexte||v.subtitle||'')}</div>
      </div>
    </div>`;

  } else if(tv === 'text_bullets'){
    const items = v.items||v.elements||v.points||[];
    const rows = items.map((it,i)=>`
      <div class="tb-item" data-i="${i}">
        <div class="tb-num">${String(i+1).padStart(2,'0')}</div>
        <div class="tb-text">${fmt(String(it))}</div>
      </div>`).join('');
    html = `<div class="scene">
      ${chrome()}
      <div class="scn-inner">
        <div class="tb-header">
          ${v.eyebrow ? `<div class="tb-label">${esc(v.eyebrow)}</div>` : ''}
          <div class="tb-title" id="_tit">${fmt(v.titre||v.titre_principal||'')}</div>
        </div>
        <div class="tb-rule"></div>
        ${rows}
      </div>
    </div>`;

  } else if(tv === 'bar_chart'){
    const series = v.series||[];
    const maxVal = Math.max(...series.map(s=>s.valeur),1);
    const unite  = v.unite||'%';
    const bars   = series.map(s=>{
      const pct = ((s.valeur/maxVal)*100).toFixed(1);
      return `<div class="bc-row">
        <div class="bc-meta">
          <span class="bc-lbl">${esc(s.label)}</span>
          <span class="bc-vl">${s.valeur}${unite}</span>
        </div>
        <div class="bc-track"><div class="bc-fill" style="--w:${pct}%"></div></div>
      </div>`;
    }).join('');
    html = `<div class="scene">
      ${chrome()}
      <div class="scn-inner">
        ${v.eyebrow ? `<div class="bc-label-tag">${esc(v.eyebrow)}</div>` : ''}
        <div class="bc-title" id="_tit">${fmt(v.titre||v.titre_principal||'')}</div>
        <div class="bc-rule"></div>
        <div class="bc-bars">${bars}</div>
        ${v.source ? `<div class="bc-source">${esc(v.source)}</div>` : ''}
      </div>
    </div>`;

  } else if(tv === 'cta_screen'){
    html = `<div class="scene scene-cta">
      ${chrome()}
      <div class="cta-wrap">
        <div class="cta-top-rule"></div>
        <div class="cta-label">${esc(v.eyebrow||_B())}</div>
        <div class="cta-headline" id="_hl">${fmt(v.headline||v.titre_principal||v.titre||'')}</div>
        <div class="cta-rule"></div>
        ${(v.body||v.sous_titre) ? `<div class="cta-sub" id="_sub">${fmt(v.body||v.sous_titre)}</div>` : ''}
        <div class="cta-btn-wrap">
          <div class="cta-btn">${esc(v.cta_text||'Book a Consultation')}</div>
        </div>
      </div>
    </div>`;

  } else {
    const items = v.etapes||v.items||v.elements||[];
    const rows = items.map((it,i)=>`
      <div class="tb-item" data-i="${i}">
        <div class="tb-num">${String(i+1).padStart(2,'0')}</div>
        <div class="tb-text">${fmt(String(it))}</div>
      </div>`).join('');
    html = `<div class="scene">
      ${chrome()}
      <div class="scn-inner">
        <div class="tb-title" id="_tit">${fmt(v.titre||v.titre_principal||'')}</div>
        <div class="tb-rule"></div>
        ${rows}
      </div>
    </div>`;
  }

  c.innerHTML = html;
  setTimeout(()=>{
    fitText(document.getElementById('_hl'),  40);
    fitText(document.getElementById('_sub'), 22);
    fitText(document.getElementById('_tit'), 28);
    fitText(document.getElementById('_ctx'), 20);
  }, 60);
  return true;
};

window.animateScene = function(){
  requestAnimationFrame(()=>{
    document.querySelectorAll('.tb-item').forEach((el,i)=>{
      setTimeout(()=>el.classList.add('visible'), 100+i*130);
    });
    setTimeout(()=>{
      document.querySelectorAll('.bc-fill').forEach(el=>el.classList.add('anim'));
    }, 200);
  });
};
window.isAnimationComplete = function(d){ return new Promise(r=>setTimeout(r, d||600)); };
</script>
</body>
</html>
