<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>Reel — Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root { --dark-blue:#08316F; --sky-blue:#00B6FF; }

html, body {
  width:1080px; height:1920px; overflow:hidden;
  font-family:'Montserrat', sans-serif;
  background: var(--dark-blue); color:#fff;
}
#scene-container { width:1080px; height:1920px; position:relative; }

/* ── SCENE BASE ── */
.scene {
  width:1080px; height:1920px; position:absolute; inset:0;
  display:flex; flex-direction:column; overflow:hidden;
  background: var(--dark-blue);
}

/* Decorative concentric arcs top-right */
.scene::before {
  content:''; position:absolute; right:-160px; top:-160px;
  width:520px; height:520px;
  border:1px solid color-mix(in srgb, var(--sky-blue) 18%, transparent);
  border-radius:50%; pointer-events:none; z-index:0;
}
.scene::after {
  content:''; position:absolute; right:-60px; top:-60px;
  width:300px; height:300px;
  border:1px solid color-mix(in srgb, var(--sky-blue) 10%, transparent);
  border-radius:50%; pointer-events:none; z-index:0;
}

/* ── BRAND CHROME ── */
.brand-strip {
  position:absolute; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, var(--sky-blue), transparent);
  z-index:10;
}
.brand-bar {
  position:absolute; top:3px; left:0; right:0; height:80px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 72px; z-index:10;
}
.brand-name {
  font-family:'Cormorant Garamond', serif;
  font-size:18px; font-weight:400; letter-spacing:0.35em;
  text-transform:uppercase; color:rgba(255,255,255,0.65);
}
.brand-badge {
  font-size:10px; font-weight:600; letter-spacing:0.35em;
  text-transform:uppercase; color:var(--sky-blue); opacity:0.75;
}
.scene-footer {
  position:absolute; bottom:0; left:0; right:0; height:68px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 72px;
  border-top:1px solid rgba(255,255,255,0.1); z-index:10;
}
.ftr-l {
  font-family:'Cormorant Garamond', serif;
  font-size:15px; font-weight:400; letter-spacing:0.22em;
  text-transform:uppercase; color:rgba(255,255,255,0.3);
}
.ftr-r { font-size:13px; color:rgba(255,255,255,0.18); letter-spacing:0.06em; }

/* ── INNER CONTENT AREA ── */
.scn-inner {
  position:absolute; top:83px; bottom:68px; left:0; right:0;
  display:flex; flex-direction:column; padding:0 72px;
  justify-content:center; z-index:1;
}
.scn-inner.top { justify-content:flex-start; padding-top:52px; }

/* ── TITLE CARD ── */
.tc-eyebrow {
  font-size:11px; font-weight:600; letter-spacing:0.46em;
  text-transform:uppercase; color:var(--sky-blue); margin-bottom:52px;
}
.tc-rule-pre { width:36px; height:1px; background:rgba(255,255,255,0.22); margin-bottom:52px; }
.tc-headline {
  font-family:'Cormorant Garamond', serif;
  font-size:104px; font-weight:700; line-height:0.93;
  color:#fff; letter-spacing:-0.02em; margin-bottom:60px;
}
.tc-rule { width:72px; height:1px; background:rgba(255,255,255,0.2); margin-bottom:52px; }
.tc-sub {
  font-family:'Cormorant Garamond', serif;
  font-size:32px; font-weight:300; font-style:italic;
  line-height:1.55; color:rgba(255,255,255,0.52); max-width:700px;
}

/* ── BIG NUMBER ── */
.bn-label {
  font-size:11px; font-weight:600; letter-spacing:0.46em;
  text-transform:uppercase; color:rgba(255,255,255,0.38); margin-bottom:72px;
}
.bn-border {
  border-top:1px solid rgba(255,255,255,0.14);
  border-bottom:1px solid rgba(255,255,255,0.14);
  padding:64px 0; margin-bottom:64px;
  display:flex; align-items:baseline; gap:20px;
}
.bn-value {
  font-family:'Cormorant Garamond', serif;
  font-size:236px; font-weight:700; line-height:0.85;
  color:var(--sky-blue); letter-spacing:-0.04em;
}
.bn-unit {
  font-family:'Cormorant Garamond', serif;
  font-size:78px; font-weight:300; color:rgba(255,255,255,0.65);
}
.bn-context {
  font-family:'Cormorant Garamond', serif;
  font-size:28px; font-weight:300; font-style:italic;
  line-height:1.6; color:rgba(255,255,255,0.52); max-width:700px;
}

/* ── TEXT BULLETS ── */
.tb-eyebrow {
  font-size:11px; font-weight:600; letter-spacing:0.46em;
  text-transform:uppercase; color:var(--sky-blue); margin-bottom:28px;
}
.tb-title {
  font-family:'Cormorant Garamond', serif;
  font-size:68px; font-weight:700; color:#fff;
  line-height:1.02; margin-bottom:52px; letter-spacing:-0.01em;
}
.tb-rule { width:100%; height:1px; background:rgba(255,255,255,0.12); margin-bottom:0; }
.tb-item {
  display:flex; align-items:baseline; gap:28px;
  padding:32px 0;
  border-bottom:1px solid rgba(255,255,255,0.07);
  opacity:0; transform:translateY(10px);
  transition:opacity 0.55s, transform 0.55s;
}
.tb-item.visible { opacity:1; transform:none; }
.tb-num {
  font-family:'Cormorant Garamond', serif;
  font-size:24px; font-weight:400; font-style:italic;
  color:var(--sky-blue); min-width:48px; opacity:0.65;
}
.tb-text {
  font-size:30px; font-weight:400; color:rgba(255,255,255,0.82);
  line-height:1.48; flex:1;
}

/* ── BAR CHART ── */
.bc-eyebrow {
  font-size:11px; font-weight:600; letter-spacing:0.46em;
  text-transform:uppercase; color:var(--sky-blue); margin-bottom:28px;
}
.bc-title {
  font-family:'Cormorant Garamond', serif;
  font-size:62px; font-weight:700; color:#fff;
  line-height:1.02; margin-bottom:52px;
}
.bc-rule { width:100%; height:1px; background:rgba(255,255,255,0.12); margin-bottom:48px; }
.bc-bars { flex:1; display:flex; flex-direction:column; justify-content:space-evenly; gap:24px; }
.bc-row { display:flex; flex-direction:column; gap:10px; }
.bc-label-row { display:flex; justify-content:space-between; align-items:baseline; }
.bc-label {
  font-family:'Cormorant Garamond', serif;
  font-size:24px; font-weight:400; font-style:italic;
  color:rgba(255,255,255,0.65);
}
.bc-val { font-size:28px; font-weight:700; color:var(--sky-blue); font-family:'Montserrat', sans-serif; }
.bc-track { height:4px; background:rgba(255,255,255,0.1); }
.bc-fill {
  height:100%; background:var(--sky-blue);
  width:0%; transition:width 1.3s cubic-bezier(0.4,0,0.2,1);
}
.bc-fill.anim { width:var(--w); }
.bc-source {
  font-family:'Cormorant Garamond', serif;
  font-size:16px; font-style:italic; color:rgba(255,255,255,0.22); margin-top:24px;
}

/* ── CTA ── */
.cta-vert-rule {
  width:1px; height:56px;
  background:rgba(255,255,255,0.2); margin:0 auto 52px;
}
.cta-eyebrow {
  font-size:11px; font-weight:600; letter-spacing:0.46em;
  text-transform:uppercase; color:var(--sky-blue); margin-bottom:44px;
  text-align:center;
}
.cta-headline {
  font-family:'Cormorant Garamond', serif;
  font-size:88px; font-weight:700; color:#fff;
  line-height:0.97; letter-spacing:-0.02em; margin-bottom:52px;
  text-align:center;
}
.cta-rule { width:36px; height:1px; background:rgba(255,255,255,0.28); margin:0 auto 44px; }
.cta-sub {
  font-family:'Cormorant Garamond', serif;
  font-size:26px; font-weight:300; font-style:italic;
  line-height:1.65; color:rgba(255,255,255,0.46);
  text-align:center; margin-bottom:64px; max-width:640px;
}
.cta-btn {
  display:inline-flex; align-items:center; gap:16px;
  padding:22px 56px;
  border:1px solid rgba(255,255,255,0.22);
  font-size:13px; font-weight:600; letter-spacing:0.26em;
  text-transform:uppercase; color:#fff;
}
.cta-btn:hover { background:rgba(255,255,255,0.06); }
.scene-cta-wrap {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%;
}
</style>
</head>
<body>
<div id="scene-container"></div>
<script>
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(s){ return esc(s).replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/\n/g,'<br>'); }
function fitText(el, minPx){
  if(!el||!el.parentElement) return;
  let sz=parseFloat(getComputedStyle(el).fontSize), i=0;
  while(i++<80 && el.scrollHeight>el.parentElement.clientHeight+8 && sz>minPx){ sz-=2; el.style.fontSize=sz+'px'; }
}

function _B(){ return (window.__brand&&window.__brand.name)||''; }
function _U(){ return ''; }
function chrome(){
  return `<div class="brand-strip"></div>
<div class="brand-bar"><span class="brand-name">${_B()}</span><span class="brand-badge">REEL</span></div>
<div class="scene-footer"><span class="ftr-l">${_B()}</span><span class="ftr-r">${_U()}</span></div>`;
}

window.loadScene = function(data){
  const c = document.getElementById('scene-container');
  const v = data.visuel || {};
  const tv = data.type_visuel || 'title_card';
  let html = '';

  if(tv === 'title_card'){
    html = `<div class="scene">
      ${chrome()}
      <div class="scn-inner">
        ${v.eyebrow ? `<div class="tc-eyebrow">${esc(v.eyebrow)}</div>` : '<div class="tc-rule-pre"></div>'}
        <div class="tc-headline" id="_hl">${fmt(v.titre_principal||v.titre||'')}</div>
        <div class="tc-rule"></div>
        <div class="tc-sub" id="_sub">${fmt(v.sous_titre||v.subtitle||'')}</div>
      </div>
    </div>`;

  } else if(tv === 'big_number'){
    html = `<div class="scene">
      ${chrome()}
      <div class="scn-inner">
        <div class="bn-label" id="_ey">${fmt(v.eyebrow||v.label||v.titre||'')}</div>
        <div class="bn-border">
          <div class="bn-value">${esc(v.valeur||'0')}</div>
          <div class="bn-unit">${esc(v.unite||'')}</div>
        </div>
        <div class="bn-context" id="_ctx">${fmt(v.contexte||v.subtitle||'')}</div>
      </div>
    </div>`;

  } else if(tv === 'text_bullets'){
    const items = v.items||v.elements||v.points||[];
    const rows = items.map((it,i)=>`
      <div class="tb-item" data-i="${i}">
        <div class="tb-num">0${i+1}</div>
        <div class="tb-text">${fmt(String(it))}</div>
      </div>`).join('');
    html = `<div class="scene">
      ${chrome()}
      <div class="scn-inner top">
        ${v.eyebrow ? `<div class="tb-eyebrow">${esc(v.eyebrow)}</div>` : ''}
        <div class="tb-title" id="_tit">${fmt(v.titre||v.titre_principal||'')}</div>
        <div class="tb-rule"></div>
        ${rows}
      </div>
    </div>`;

  } else if(tv === 'bar_chart'){
    const series = v.series||[];
    const maxVal = Math.max(...series.map(s=>s.valeur),1);
    const unite  = v.unite||'%';
    const bars   = series.map(s=>{
      const pct = ((s.valeur/maxVal)*100).toFixed(1);
      return `<div class="bc-row">
        <div class="bc-label-row">
          <span class="bc-label">${esc(s.label)}</span>
          <span class="bc-val">${s.valeur}${unite}</span>
        </div>
        <div class="bc-track"><div class="bc-fill" style="--w:${pct}%"></div></div>
      </div>`;
    }).join('');
    html = `<div class="scene">
      ${chrome()}
      <div class="scn-inner top">
        ${v.eyebrow ? `<div class="bc-eyebrow">${esc(v.eyebrow)}</div>` : ''}
        <div class="bc-title" id="_tit">${fmt(v.titre||v.titre_principal||'')}</div>
        <div class="bc-rule"></div>
        <div class="bc-bars">${bars}</div>
        ${v.source ? `<div class="bc-source">${esc(v.source)}</div>` : ''}
      </div>
    </div>`;

  } else if(tv === 'cta_screen'){
    html = `<div class="scene">
      ${chrome()}
      <div class="scn-inner">
        <div class="scene-cta-wrap">
          <div class="cta-vert-rule"></div>
          <div class="cta-eyebrow">${esc(v.eyebrow||_B())}</div>
          <div class="cta-headline" id="_hl">${fmt(v.headline||v.titre_principal||v.titre||'')}</div>
          <div class="cta-rule"></div>
          ${(v.body||v.sous_titre) ? `<div class="cta-sub" id="_sub">${fmt(v.body||v.sous_titre)}</div>` : ''}
          <div class="cta-btn">${esc(v.cta_text||'Book a Consultation')}</div>
        </div>
      </div>
    </div>`;

  } else {
    const items = v.etapes||v.items||v.elements||[];
    const rows = items.map((it,i)=>`
      <div class="tb-item" data-i="${i}">
        <div class="tb-num">0${i+1}</div>
        <div class="tb-text">${fmt(String(it))}</div>
      </div>`).join('');
    html = `<div class="scene">
      ${chrome()}
      <div class="scn-inner top">
        <div class="tb-title" id="_tit">${fmt(v.titre||v.titre_principal||'')}</div>
        <div class="tb-rule"></div>
        ${rows}
      </div>
    </div>`;
  }

  c.innerHTML = html;
  setTimeout(()=>{
    fitText(document.getElementById('_hl'),  40);
    fitText(document.getElementById('_sub'), 22);
    fitText(document.getElementById('_tit'), 28);
    fitText(document.getElementById('_ctx'), 20);
  }, 60);
  return true;
};

window.animateScene = function(){
  requestAnimationFrame(()=>{
    document.querySelectorAll('.tb-item').forEach((el,i)=>{
      setTimeout(()=>el.classList.add('visible'), 120+i*140);
    });
    setTimeout(()=>{
      document.querySelectorAll('.bc-fill').forEach(el=>el.classList.add('anim'));
    }, 200);
  });
};
window.isAnimationComplete = function(d){ return new Promise(r=>setTimeout(r, d||700)); };
</script>
</body>
</html>
