<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>Carousel — Rodschinson Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --navy:#08316F;
  --navy-deep:#061F47;
  --sky:#00B6FF;
  --gold:#C8A96E;
  --white:#FFFFFF;
  --brand-primary:#08316F;
  --brand-accent:#C8A96E;
}
html, body {
  width:1080px; height:1080px; overflow:hidden;
  font-family:'Montserrat', sans-serif;
  color:var(--white);
  background:var(--navy);
}
#scene-container { width:1080px; height:1080px; position:relative; }

.scene {
  position:absolute; inset:0; display:none;
  flex-direction:column; overflow:hidden;
  background:
    radial-gradient(ellipse 120% 80% at 12% 0%, rgba(0,182,255,0.14) 0%, transparent 55%),
    radial-gradient(ellipse 120% 80% at 100% 100%, rgba(200,169,110,0.10) 0%, transparent 55%),
    linear-gradient(160deg, var(--navy) 0%, var(--navy-deep) 100%);
}
.scene.active { display:flex; }

/* ── HEADER — RODSCHINSON wordmark ────────────────────────────────── */
.frame-header {
  position:absolute; top:0; left:0; right:0; height:96px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 60px; z-index:10;
}
.wordmark {
  font-family:'Montserrat', sans-serif;
  font-size:18px; font-weight:300; letter-spacing:0.42em;
  color:var(--white);
}
.wordmark em {
  font-style:normal; font-size:10px; font-weight:400;
  letter-spacing:0.52em; display:block; text-align:center;
  color:var(--sky); margin-top:4px;
}
.frame-counter {
  font-family:'Playfair Display', serif;
  font-size:14px; letter-spacing:0.08em;
  color:var(--gold); opacity:0.85;
}

/* Thin sky rule across header bottom */
.scene::before {
  content:''; position:absolute;
  left:60px; right:60px; top:96px;
  height:1px;
  background:linear-gradient(90deg, transparent 0%, rgba(0,182,255,0.45) 20%, rgba(200,169,110,0.45) 80%, transparent 100%);
  z-index:6;
}
/* Gold L-bracket bottom-right */
.scene::after {
  content:''; position:absolute;
  bottom:48px; right:48px;
  width:56px; height:56px;
  border-bottom:2px solid rgba(200,169,110,0.6);
  border-right:2px solid rgba(200,169,110,0.6);
  z-index:5; pointer-events:none;
}

/* ── TITLE SLIDE ─────────────────────────────────────────────────── */
.slide-title {
  padding:150px 72px 90px;
  justify-content:space-between;
}
.t-eyebrow {
  font-size:12px; font-weight:500; letter-spacing:0.5em;
  text-transform:uppercase; color:var(--sky);
}
.t-eyebrow span { color:var(--gold); margin:0 10px; }
.t-headline {
  font-family:'Playfair Display', serif;
  font-size:80px; font-weight:500; line-height:1.03;
  color:var(--white); letter-spacing:-0.01em;
  margin-top:28px; max-width:920px;
}
.t-rule-block { display:flex; align-items:center; gap:18px; margin-top:44px; }
.t-rule { width:72px; height:2px; background:var(--gold); }
.t-rule-text {
  font-size:13px; font-weight:500; letter-spacing:0.28em;
  text-transform:uppercase; color:rgba(255,255,255,0.7);
}
.t-sub {
  font-size:22px; font-weight:300; line-height:1.55;
  color:rgba(255,255,255,0.82); max-width:820px; margin-top:28px;
}
.t-footer {
  display:flex; align-items:center; justify-content:space-between;
  border-top:1px solid rgba(255,255,255,0.12); padding-top:24px;
}
.t-swipe {
  font-size:13px; font-weight:500; letter-spacing:0.32em;
  text-transform:uppercase; color:var(--white);
  display:flex; align-items:center; gap:14px;
}
.t-swipe::after { content:'→'; color:var(--sky); font-size:20px; }
.t-yr {
  font-family:'Playfair Display', serif;
  font-size:15px; color:var(--gold); letter-spacing:0.12em;
}

/* ── CONTENT SLIDE ───────────────────────────────────────────────── */
.slide-content {
  padding:140px 72px 88px;
  justify-content:flex-start;
}
.c-tag-row {
  display:flex; align-items:center; gap:20px; margin-bottom:28px;
}
.c-tag-num {
  font-family:'Playfair Display', serif;
  font-size:22px; font-style:italic; font-weight:400;
  color:var(--gold); letter-spacing:0.04em;
}
.c-tag-label {
  font-size:11px; font-weight:500; letter-spacing:0.36em;
  text-transform:uppercase; color:rgba(255,255,255,0.55);
}
.c-tag-line { flex:1; height:1px; background:rgba(255,255,255,0.15); }
.c-headline {
  font-family:'Playfair Display', serif;
  font-size:54px; font-weight:500; line-height:1.08;
  color:var(--white); letter-spacing:-0.01em;
  max-width:900px;
}
.c-rule { width:48px; height:2px; background:var(--gold); margin:30px 0 26px; }
.c-body {
  font-size:20px; font-weight:300; line-height:1.65;
  color:rgba(255,255,255,0.85); max-width:820px;
}

/* Big centered stat anchor — fills former empty middle */
.c-stat-card {
  margin-top:auto; margin-bottom:18px;
  display:flex; align-items:center; gap:28px;
  padding:28px 32px;
  background:linear-gradient(90deg, rgba(0,182,255,0.10) 0%, rgba(200,169,110,0.06) 100%);
  border-left:3px solid var(--gold);
  border-radius:2px;
}
.c-stat-num {
  font-family:'Playfair Display', serif;
  font-size:72px; font-weight:500; color:var(--gold);
  letter-spacing:-0.02em; line-height:1; white-space:nowrap;
}
.c-stat-desc {
  font-size:18px; font-weight:300; color:rgba(255,255,255,0.88);
  line-height:1.5; flex:1;
}

/* Faint large index watermark */
.c-watermark {
  position:absolute;
  top:110px; right:60px;
  font-family:'Playfair Display', serif;
  font-size:220px; font-weight:400;
  color:rgba(200,169,110,0.06); line-height:1; z-index:0;
}

/* ── CTA SLIDE ───────────────────────────────────────────────────── */
.slide-cta {
  justify-content:center; align-items:center;
  text-align:center; padding:120px 72px 96px;
  background:
    radial-gradient(ellipse 70% 50% at 50% 45%, rgba(0,182,255,0.18) 0%, transparent 70%),
    linear-gradient(160deg, var(--navy) 0%, var(--navy-deep) 100%);
}
.cta-overline {
  font-size:12px; font-weight:500; letter-spacing:0.5em;
  text-transform:uppercase; color:var(--sky); margin-bottom:40px;
}
.cta-headline {
  font-family:'Playfair Display', serif;
  font-size:76px; font-weight:500; line-height:1.02;
  color:var(--white); letter-spacing:-0.01em; max-width:900px;
}
.cta-rule { width:80px; height:2px; background:var(--gold); margin:36px auto; }
.cta-body {
  font-size:22px; font-weight:300; line-height:1.6;
  color:rgba(255,255,255,0.82); max-width:720px; margin-bottom:48px;
}
.hashtags { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
.hashtag {
  font-size:14px; font-weight:500; letter-spacing:0.08em;
  color:var(--gold); border:1px solid rgba(200,169,110,0.4);
  padding:8px 20px; border-radius:22px;
}
.cta-contact {
  margin-top:56px; font-size:14px; font-weight:400;
  letter-spacing:0.22em; text-transform:uppercase;
  color:rgba(255,255,255,0.55);
}
.cta-contact span { color:var(--sky); margin:0 14px; }
</style>
</head>
<body>
<div id="scene-container"></div>
<script>
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(s){ return esc(s).replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/\n/g,'<br>'); }

function header(idx, total){
  const counter = total ? `${String(idx).padStart(2,'0')} / ${String(total).padStart(2,'0')}` : '';
  return `<div class="frame-header">
    <div class="wordmark">RODSCHINSON<em>INVESTMENT</em></div>
    <div class="frame-counter">${counter}</div>
  </div>`;
}

function parseStatBlock(stat){
  if (!stat) return '';
  const [v, d] = String(stat).split(/\s*—\s*/, 2);
  return `<div class="c-stat-card">
    <div class="c-stat-num">${esc((v||'').trim())}</div>
    <div class="c-stat-desc">${esc(d||'')}</div>
  </div>`;
}

window.loadScene = function(slideData){
  const c     = document.getElementById('scene-container');
  const idx   = slideData.index || 1;
  const type  = slideData.type  || 'content';
  const total = slideData.total || '';
  const yr    = new Date().getFullYear();

  let scene = '';

  if (type === 'title'){
    scene = `<div class="scene slide-title active" id="scene">
      <div>
        <div class="t-eyebrow">Strategy <span>·</span> Insight <span>·</span> ${yr}</div>
        <div class="t-headline">${fmt(slideData.headline || '')}</div>
        <div class="t-rule-block">
          <div class="t-rule"></div>
          <div class="t-rule-text">Rodschinson Investment</div>
        </div>
        <div class="t-sub">${esc(slideData.subheadline || '')}</div>
      </div>
      <div class="t-footer">
        <div class="t-swipe">${esc(slideData.cta || 'Swipe')}</div>
        <div class="t-yr">${yr}</div>
      </div>
    </div>`;

  } else if (type === 'cta'){
    const tags = (slideData.hashtags || []).map(h => `<span class="hashtag">${esc(h)}</span>`).join('');
    scene = `<div class="scene slide-cta active" id="scene">
      <div class="cta-overline">Rodschinson <span style="color:var(--gold)">·</span> Investment</div>
      <div class="cta-headline">${fmt(slideData.headline || '')}</div>
      <div class="cta-rule"></div>
      <div class="cta-body">${esc(slideData.body || '')}</div>
      ${tags ? `<div class="hashtags">${tags}</div>` : ''}
      <div class="cta-contact">rodschinson.com <span>·</span> +32 2 550 36 87 <span>·</span> assets@rodschinson.com</div>
    </div>`;

  } else {
    scene = `<div class="scene slide-content active" id="scene">
      <div class="c-watermark">${String(idx).padStart(2,'0')}</div>
      <div class="c-tag-row">
        <div class="c-tag-num">${String(idx).padStart(2,'0')}.</div>
        <div class="c-tag-label">Insight</div>
        <div class="c-tag-line"></div>
      </div>
      <div class="c-headline">${fmt(slideData.headline || '')}</div>
      <div class="c-rule"></div>
      <div class="c-body">${esc(slideData.body || '')}</div>
      ${parseStatBlock(slideData.stat)}
    </div>`;
  }

  c.innerHTML = header(idx, total) + scene;
  return true;
};

window.animateScene = function(){};
window.isAnimationComplete = function(d){ return new Promise(r=>setTimeout(r, d||200)); };
</script>
</body>
</html>
